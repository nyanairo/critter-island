<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1d2a3a">
  <meta name="description" content="ドット絵モンスター育成 — 召喚・週次トレーニング・大会の縦串MVP">
  <title>クリッター・アイランド</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">🐣</span>
        <h1>クリッター・アイランド</h1>
      </div>
      <div class="hud" id="hud" aria-live="polite"></div>
    </header>

    <main class="stage">
      <canvas id="screen" width="384" height="216" aria-label="ゲーム画面"></canvas>
      <div class="overlay" id="overlay" hidden></div>
    </main>

    <section class="panel" id="panel" aria-live="polite">
      <p class="hint" id="hint">読み込み中...</p>
      <div class="actions" id="actions"></div>
    </section>

    <footer class="app-footer">
      <button id="resetBtn" class="ghost" type="button">最初から</button>
      <span class="version">v0.1 (MVP)</span>
    </footer>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
