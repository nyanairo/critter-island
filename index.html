<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1d2a3a">
  <meta name="description" content="Critter Island: summon, train, and battle critters.">
  <title>Critter Island</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">CI</span>
        <h1>Critter Island</h1>
      </div>
      <div class="hud" id="hud" aria-live="polite"></div>
    </header>

    <main class="stage">
      <canvas id="screen" width="384" height="216" aria-label="Game screen"></canvas>
      <div class="overlay" id="overlay" hidden></div>
    </main>

    <section class="panel" id="panel" aria-live="polite">
      <p class="hint" id="hint">Loading...</p>
      <div class="actions" id="actions"></div>
    </section>

    <footer class="app-footer">
      <button id="resetBtn" class="ghost" type="button">Reset</button>
      <span class="version">v0.2</span>
    </footer>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
